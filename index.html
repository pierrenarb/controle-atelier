<style>
:root{
  --navy:#0F2A48;
  --navy-2:#173a5e;
  --teal:#1D9E75;
  --gold:#C9A227;
  --ink:#1b2733;
  --muted:#6a7a8a;
  --line:#e2e8ee;
  --bg:#eef2f6;
  --card:#ffffff;
  --e0:#D64545;
  --e1:#E8833A;
  --e2:#E3B505;
  --e3:#7FB93E;
  --e4:#1D9E75;
  --radius:14px;
  --shadow:0 1px 2px rgba(15,42,72,.06),0 8px 24px rgba(15,42,72,.06);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--font);
  color:var(--ink);
  background:var(--bg);
  line-height:1.45;
  padding-bottom:96px;
  -webkit-font-smoothing:antialiased;
}

/* ---------- HEADER ---------- */
.appbar{
  position:sticky;top:0;z-index:40;
  background:linear-gradient(180deg,var(--navy),var(--navy-2));
  color:#fff;
  padding:calc(env(safe-area-inset-top) + 14px) 18px 14px;
  box-shadow:0 4px 20px rgba(15,42,72,.25);
}
.appbar-row{display:flex;align-items:center;gap:12px}
.brand{display:flex;flex-direction:column;line-height:1.05}
.brand .logo{font-weight:800;letter-spacing:.5px;font-size:17px}
.brand .logo b{color:var(--gold)}
.brand .sub{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:#9db4cc;font-weight:600;margin-top:3px}
.badge-pts{
  margin-left:auto;text-align:center;background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.16);border-radius:12px;padding:6px 12px;
}
.badge-pts .n{font-size:20px;font-weight:800;color:var(--teal);display:block;line-height:1}
.badge-pts .l{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#9db4cc}
.progress{height:5px;background:rgba(255,255,255,.14);border-radius:99px;margin-top:14px;overflow:hidden}.progress > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--gold));transition:width .35s ease}
.savechip{
  position:absolute;right:16px;top:calc(env(safe-area-inset-top) + 12px);
  font-size:10px;color:#9db4cc;display:flex;align-items:center;gap:5px;opacity:0;transition:opacity .3s
}
.savechip.on{opacity:1}
.savechip::before{content:"";width:7px;height:7px;border-radius:99px;background:var(--teal)}
.iconbtn{
  flex:0 0 auto;width:38px;height:38px;margin-left:10px;border-radius:10px;
  background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);color:#fff;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;
}
.iconbtn:active{background:rgba(255,255,255,.22)}
.modal{
  position:fixed;inset:0;background:rgba(15,42,72,.55);backdrop-filter:blur(3px);
  display:none;align-items:flex-end;justify-content:center;z-index:80;
}
.modal.show{display:flex}
.sheet{
  background:#fff;width:100%;max-width:760px;border-radius:18px 18px 0 0;
  padding:20px 18px calc(env(safe-area-inset-bottom) + 20px);box-shadow:0 -12px 40px rgba(15,42,72,.32);
}
.sheet h3{margin:0 0 4px;color:var(--navy);font-size:18px}
.sheet .sub{color:var(--muted);font-size:12.5px;margin-bottom:18px;line-height:1.4}
.sheet .field{margin-bottom:14px}
.sheet-actions{display:flex;gap:10px;margin-top:8px}
@media(min-width:600px){ .modal{align-items:center} .sheet{border-radius:18px;margin:0 16px} }

/* ---------- INSTALL BAR ---------- */
.installbar{
  display:none;align-items:center;gap:12px;
  max-width:760px;margin:12px auto 0;padding:12px 14px;
  background:#fff;border:1.5px solid var(--line);border-left:4px solid var(--gold);
  border-radius:12px;box-shadow:var(--shadow);
}
.installbar.show{display:flex}
.installbar .ib-txt{flex:1;min-width:0}
.installbar .ib-txt b{display:block;font-size:14px;color:var(--navy)}
.installbar .ib-txt span{font-size:12px;color:var(--muted)}
.installbar .ib-go{
  border:0;background:var(--navy);color:#fff;font-family:var(--font);font-weight:700;font-size:13px;
  padding:10px 16px;border-radius:10px;cursor:pointer;white-space:nowrap;
}
.installbar .ib-x{border:0;background:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;padding:0 4px}

/* ---------- LAYOUT ---------- */
.wrap{max-width:760px;margin:0 auto;padding:18px 14px 0}

/* ---------- INFO CARD ---------- */
.info{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:16px;margin-bottom:18px;
}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1 / -1}
.field label{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}
.field input,.field select{
  font-family:var(--font);font-size:15px;color:var(--ink);
  padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fbfcfd;
  width:100%;transition:border-color .15s,box-shadow .15s;
}
.field input:focus,.field select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(29,158,117,.14)}

/* ---------- SECTION ---------- */
.section{margin-bottom:16px}
.section-head{
  display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;
  background:var(--navy);color:#fff;border-radius:12px;padding:13px 16px;
  box-shadow:var(--shadow);
}
.section-head h2{margin:0;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
.section-head .count{margin-left:auto;font-size:12px;color:#9db4cc;font-weight:600}
.section-head .chev{transition:transform .25s;color:#9db4cc}
.section.collapsed .chev{transform:rotate(-90deg)}
.section-body{padding-top:12px;display:grid;gap:10px}
.section.collapsed .section-body{display:none}

/* ---------- ITEM CARD ---------- */
.item{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px 14px 12px;border:1.5px solid transparent;transition:border-color .2s,opacity .2s;
}
.item.off{opacity:.5}
.item-top{display:flex;align-items:center;gap:12px}
.item-ic{
  flex:0 0 auto;width:36px;height:36px;border-radius:10px;
  background:rgba(15,42,72,.06);color:var(--navy);
  display:flex;align-items:center;justify-content:center;
}
.item-name{font-weight:700;font-size:15.5px;flex:1;min-width:0}
.item.done{border-color:rgba(29,158,117,.35)}
.item.done .item-ic{background:rgba(29,158,117,.12);color:var(--teal)}

/* options (type de batterie…) */
.opts{display:flex;align-items:center;flex-wrap:wrap;gap:7px;margin-top:12px}
.opts.hide{display:none}
.opts-lbl{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-right:2px}
.opt{
  border:1.5px solid var(--line);background:#fbfcfd;border-radius:99px;
  font-family:var(--font);font-weight:700;font-size:12.5px;color:var(--muted);
  padding:7px 14px;cursor:pointer;transition:all .13s;
}
.opt:active{transform:scale(.96)}
.opt.sel{background:var(--navy);border-color:var(--navy);color:#fff}

/* toggle oui/non */
.toggle{display:inline-flex;background:#eef2f6;border-radius:99px;padding:3px;gap:2px}
.toggle button{
  border:0;background:transparent;font-family:var(--font);font-weight:700;font-size:12.5px;
  color:var(--muted);padding:6px 13px;border-radius:99px;cursor:pointer;transition:all .15s;letter-spacing:.3px;
}
.toggle button[data-on="oui"].active{background:var(--teal);color:#fff;box-shadow:0 2px 6px rgba(29,158,117,.35)}
.toggle button[data-on="non"].active{background:#8494a4;color:#fff}

/* état gauge */
.gauge-wrap{margin-top:12px}
.gauge-label{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:7px;display:flex;justify-content:space-between}
.gauge-label span:last-child{color:var(--ink);font-weight:800}
.gauge{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.gauge button{
  border:1.5px solid var(--line);background:#fbfcfd;border-radius:9px;height:42px;
  font-family:var(--font);font-weight:800;font-size:15px;color:#b6c1cc;cursor:pointer;
  transition:all .13s;position:relative;
}
.gauge button:active{transform:scale(.94)}
.gauge button.sel[data-v="0"]{background:var(--e0);border-color:var(--e0);color:#fff}
.gauge button.sel[data-v="1"]{background:var(--e1);border-color:var(--e1);color:#fff}
.gauge button.sel[data-v="2"]{background:var(--e2);border-color:var(--e2);color:#4a3c00}
.gauge button.sel[data-v="3"]{background:var(--e3);border-color:var(--e3);color:#1f3d00}
.gauge button.sel[data-v="4"]{background:var(--e4);border-color:var(--e4);color:#fff}

/* comment */
.cmt-btn{
  margin-top:10px;display:inline-flex;align-items:center;gap:6px;background:none;border:0;
  color:var(--navy);font-family:var(--font);font-weight:700;font-size:12.5px;cursor:pointer;padding:4px 0;
}
.cmt-btn .dot{width:6px;height:6px;border-radius:99px;background:var(--gold);opacity:0;transition:opacity .2s}
.cmt-btn.has .dot{opacity:1}
.cmt{margin-top:8px;display:none}
.cmt.open{display:block}
.cmt textarea{
  width:100%;font-family:var(--font);font-size:14px;color:var(--ink);
  border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;resize:vertical;min-height:60px;background:#fbfcfd;
}
.cmt textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(29,158,117,.14)}

.hide{display:none !important}

/* ---------- ACTION BAR ---------- */
.actionbar{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
  border-top:1px solid var(--line);
  padding:10px 14px calc(env(safe-area-inset-bottom) + 10px);
  display:flex;gap:10px;max-width:760px;margin:0 auto;
}
.btn{
  flex:1;border:0;border-radius:12px;font-family:var(--font);font-weight:700;font-size:14px;
  padding:14px 8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .1s,filter .15s;letter-spacing:.2px;
}
.btn:active{transform:scale(.97)}
.btn.ghost{background:#eef2f6;color:var(--navy);flex:0 0 auto;padding:14px 16px}
.btn.primary{background:var(--teal);color:#fff;box-shadow:0 6px 16px rgba(29,158,117,.35)}
.btn.primary:disabled{background:#a9c9bd;box-shadow:none;cursor:progress}
.btn svg{width:18px;height:18px}

/* ---------- TOAST + OVERLAY ---------- */
.toast{
  position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
  background:var(--navy);color:#fff;padding:12px 18px;border-radius:12px;font-size:13.5px;font-weight:600;
  box-shadow:0 10px 30px rgba(15,42,72,.35);opacity:0;pointer-events:none;transition:all .3s;z-index:60;max-width:90vw;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--e0)}
.toast.ok{background:var(--teal)}
.overlay{
  position:fixed;inset:0;background:rgba(15,42,72,.55);backdrop-filter:blur(3px);
  display:none;align-items:center;justify-content:center;z-index:70;
}
.overlay.show{display:flex}
.spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:99px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* legend */
.legend{display:flex;gap:6px;flex-wrap:wrap;font-size:10px;color:var(--muted);margin:2px 2px 16px;align-items:center}
.legend b{color:var(--ink)}
.legend .sw{width:11px;height:11px;border-radius:4px;display:inline-block;margin-right:3px;vertical-align:-1px}

@media print{ body{display:none} }
</style>
</head>
<body>

<header class="appbar">
  <div class="savechip" id="savechip">Enregistré</div>
  <div class="appbar-row">
    <div class="brand">
      <div class="logo">NARB<b>O</b>NNE ACCESS<b>O</b>IRES</div>
      <div class="sub">Contrôle Atelier</div>
    </div>
    <div class="badge-pts"><span class="n" id="ptsDone">0</span><span class="l">/ <span id="ptsTotal">18</span> points</span></div>
    <button class="iconbtn" id="btnReset" aria-label="Nouvelle fiche" title="Nouvelle fiche">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
    </button>
    <button class="iconbtn" id="btnSettings" aria-label="Réglages" title="Réglages">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
  <div class="progress"><i id="progbar"></i></div>
</header>

<div class="installbar" id="installbar">
  <div class="ib-txt"><b>Installer l'application</b><span id="ibHint">Ajouter l'icône sur cet appareil</span></div>
  <button class="ib-go" id="ibGo">Installer</button>
  <button class="ib-x" id="ibX" aria-label="Fermer">×</button>
</div>

<div class="wrap">

  <!-- INFOS -->
  <div class="info">
    <div class="info-grid">
      <div class="field">
        <label>Magasin</label>
        <select id="f_magasin">
          <option value="">— Choisir —</option>
        </select>
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="f_date">
      </div>
      <div class="field full">
        <label>Technicien</label>
        <input type="text" id="f_tech" placeholder="Nom du technicien" autocomplete="off">
      </div>
      <div class="field">
        <label>Véhicule</label>
        <input type="text" id="f_vehicule" placeholder="Marque / modèle" autocomplete="off">
      </div>
      <div class="field">
        <label>Immatriculation</label>
        <input type="text" id="f_immat" placeholder="AA-123-AA" autocomplete="off" style="text-transform:uppercase">
      </div>
      <div class="field full">
        <label>Client</label>
        <input type="text" id="f_client" placeholder="Nom du client" autocomplete="off">
      </div>
    </div>
  </div>

  <div class="legend">
    État&nbsp;:
    <span><i class="sw" style="background:var(--e0)"></i>0 Critique</span>
    <span><i class="sw" style="background:var(--e1)"></i>1 Mauvais</span>
    <span><i class="sw" style="background:var(--e2)"></i>2 Moyen</span>
    <span><i class="sw" style="background:var(--e3)"></i>3 Bon</span>
    <span><i class="sw" style="background:var(--e4)"></i>4 Excellent</span>
  </div>

  <div id="sections"></div>

</div>

<!-- ACTION BAR -->
<div class="actionbar">
  <button class="btn ghost" id="btnPrint" title="Imprimer">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
  </button>
  <button class="btn ghost" id="btnPdf" title="Aperçu PDF">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
  </button>
  <button class="btn primary" id="btnSend">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    Envoyer vers DM
  </button>
</div>

<div class="toast" id="toast"></div>
<div class="overlay" id="overlay"><div class="spinner"></div></div>

<div class="modal" id="settingsModal">
  <div class="sheet">
    <h3>Réglages de l'appareil</h3>
    <div class="sub">À renseigner une fois par magasin. Ces informations restent sur cet appareil.</div>
    <div class="field">

function iconImg(id, size, color){

function buildSection(title, items, oktoggleLabel){
  const sec = document.createElement("section");
  sec.className = "section";
  const head = document.createElement("div");
  head.className = "section-head";
  head.innerHTML = `<h2>${title}</h2><span class="count"></span>

  items.forEach(name=>{
    const id = slug(name);
    state.items[id] = state.items[id] || { name, equipe:null, etat:null, cmt:"", type:null };
    const card = document.createElement("div");
    card.className = "item";
    card.dataset.id = id;
    const optsHtml = ITEM_OPTIONS[id]
      ? `<div class="opts"><span class="opts-lbl">Type</span>${ITEM_OPTIONS[id].map(o=>`<button class="opt" data-opt="${o}">${o}</button>`).join("")}</div>`

        </div>

      <button class="cmt-btn"><span class="dot"></span>+ Commentaire</button>
      <div class="cmt"><textarea placeholder="Commentaire technicien…" rows="2"></textarea></div>
    `;
    body.appendChild(card);
    wireCard(card, id);
  });

  head.addEventListener("click", ()=> sec.classList.toggle("collapsed"));
  sec.appendChild(head); sec.appendChild(body);
  sec._count = head.querySelector(".count");
  sec._items = items.map(slug);

function wireCard(card, id){
  const st = state.items[id];
  const toggle = card.querySelector(".toggle");
  const gaugeWrap = card.querySelector(".gauge-wrap");
  const cmtBtn = card.querySelector(".cmt-btn");
  const cmtBox = card.querySelector(".cmt");
  const cmtArea = card.querySelector("textarea");
  const etatTxt = card.querySelector(".etat-txt");

  toggle.querySelectorAll("button").forEach(b=>{
    b.addEventListener("click", ()=>{
      const v = b.dataset.on;
      st.equipe = (st.equipe===v) ? null : v;
      renderCard(card, id);
      persist();
    });
  });
  card.querySelectorAll(".gauge button").forEach(b=>{
    b.addEventListener("click", ()=>{
      const v = +b.dataset.v;
      st.etat = (st.etat===v) ? null : v;
      renderCard(card, id);
      persist();
    });
  });
  cmtBtn.addEventListener("click", ()=> cmtBox.classList.toggle("open"));
  cmtArea.addEventListener("input", ()=>{ st.cmt = cmtArea.value; cmtBtn.classList.toggle("has", !!st.cmt.trim()); persist(); });

  const optsRow = card.querySelector(".opts");
  if(optsRow){
    optsRow.querySelectorAll(".opt").forEach(b=>{
      b.addEventListener("click", ()=>{
        const v = b.dataset.opt;
        st.type = (st.type===v) ? null : v;
        renderCard(card, id);
        persist();
      });
    });
  }

  card._render = ()=>{
    toggle.querySelectorAll("button").forEach(b=> b.classList.toggle("active", b.dataset.on===st.equipe));
    const isNon = st.equipe === "non";
    gaugeWrap.classList.toggle("hide", isNon);
    if(optsRow) optsRow.classList.toggle("hide", isNon);
    card.classList.toggle("off", isNon);
    card.querySelectorAll(".gauge button").forEach(b=> b.classList.toggle("sel", st.etat!==null && +b.dataset.v===st.etat));
    if(optsRow) optsRow.querySelectorAll(".opt").forEach(b=> b.classList.toggle("sel", st.type===b.dataset.opt));
    etatTxt.textContent = (st.etat===null) ? "—" : `${st.etat} · ${ETAT_LABELS[st.etat]}`;
    cmtArea.value = st.cmt || "";
    cmtBtn.classList.toggle("has", !!(st.cmt||"").trim());
    const done = st.equipe!==null && (isNon || st.etat!==null);
    card.classList.toggle("done", done);
  };
}
function renderCard(card,id){ card._render(); updateProgress(); }

/* ================= PROGRESSION ================= */
let sectionsEls = [];
function updateProgress(){
  let done=0;
  Object.values(state.items).forEach(st=>{
    if(st.equipe==="non" || (st.equipe!==null && st.etat!==null)) done++;
  });
  document.getElementById("ptsDone").textContent = done;
  document.getElementById("ptsTotal").textContent = TOTAL_PTS;
  document.getElementById("progbar").style.width = Math.round(done/TOTAL_PTS*100)+"%";
  sectionsEls.forEach(sec=>{
    const d = sec._items.filter(id=>{const s=state.items[id];return s.equipe==="non"||(s.equipe!==null&&s.etat!==null);}).length;
    sec._count.textContent = `${d}/${sec._items.length}`;
  });
}

/* ================= PERSISTANCE ================= */
let saveTimer=null;
function collectInfos(){
  state.infos = {
    magasin:val("f_magasin"), date:val("f_date"), tech:val("f_tech"),
    vehicule:val("f_vehicule"), immat:val("f_immat"), client:val("f_client")
  };
}
function val(id){ return document.getElementById(id).value.trim(); }
function persist(){
  collectInfos();
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  const chip = document.getElementById("savechip");
  chip.classList.add("on");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=> chip.classList.remove("on"), 1200);
}
function restore(){
  const raw = localStorage.getItem(LS_KEY);
  if(!raw) return;
  try{
    const saved = JSON.parse(raw);
    if(saved.infos){
      const i=saved.infos;
      set("f_magasin",i.magasin);set("f_date",i.date);set("f_tech",i.tech);
      set("f_vehicule",i.vehicule);set("f_immat",i.immat);set("f_client",i.client);
    }
    if(saved.items){
      Object.keys(saved.items).forEach(id=>{ if(state.items[id]) Object.assign(state.items[id], saved.items[id]); });
    }
  }catch(e){}
}
function set(id,v){ if(v!=null) document.getElementById(id).value=v; }

/* Convertit une icône SVG en PNG dataURL pour l'insérer dans le PDF */
function svgToPng(id, px, color){
  return new Promise(resolve=>{
    try{
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="${px}" height="${px}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[id]||ICONS._default}</svg>`;
      const img = new Image();
      img.onload = ()=>{ try{ const c=document.createElement("canvas"); c.width=px; c.height=px; c.getContext("2d").drawImage(img,0,0,px,px); resolve(c.toDataURL("image/png")); }catch(e){ resolve(null); } };
      img.onerror = ()=> resolve(null);
      img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
    }catch(e){ resolve(null); }
  });
}

async function makePdfBlob(){

  const i = state.infos;

  // pré-rendu des icônes
  const allIds = [...EQUIPEMENT.map(slug), ...ENTRETIEN.map(slug)];
  const ic = {};
  await Promise.all(allIds.map(async id=>{ ic[id] = await svgToPng(id, 28, "#0F2A48"); }));

  const L=12, R=198, W=R-L;
  const nameX=L+6, equipX=90, cx0=118, step=5.6, cmtX=146, cmtW=R-cmtX;
  let y=16, curHeader=null;

  function ensureSpace(h){ if(y+h > 285){ doc.addPage(); y=16; if(curHeader) drawColHeader(curHeader); } }
  function drawColHeader(label){
    doc.setFillColor(15,42,72); doc.rect(L,y,W,6,"F");
    doc.setFont("helvetica","bold"); doc.setFontSize(7.5); doc.setTextColor(255,255,255);
    doc.text("DESIGNATION", nameX, y+4);
    doc.text(label, equipX, y+4);
    doc.text("ETAT 0-4", cx0-2, y+4);
    doc.text("COMMENTAIRES", cmtX, y+4);
    y+=6; curHeader=label;
  }
  function drawRow(id, okLabel){
    const s = state.items[id];
    doc.setFont("helvetica","normal"); doc.setFontSize(8);
    const cmtLines = (s.cmt||"").trim() ? doc.splitTextToSize(s.cmt.trim(), cmtW).slice(0,2) : [];
    const rowH = cmtLines.length>1 ? 10.5 : 8;
    ensureSpace(rowH);
    const cy = y + rowH/2, ty = cy + 1;

    // icône
    if(ic[id]) doc.addImage(ic[id],"PNG", L+1, cy-2.2, 4.4, 4.4);
    // désignation (+ type éventuel)
    doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.setTextColor(30,40,50);
    let name = doc.splitTextToSize(s.name, 66)[0];
    doc.text(name, nameX, ty);
    if(s.type){
      const nw = doc.getTextWidth(name);
      doc.setTextColor(29,158,117); doc.setFontSize(8);
      doc.text("("+s.type+")", nameX+nw+2, ty);
    }
    // équipé / conforme
    doc.setFontSize(8);
    const oui=s.equipe==="oui", non=s.equipe==="non";
    let ex=equipX;
    doc.setFont("helvetica", oui?"bold":"normal"); doc.setTextColor(oui?29:190, oui?158:196, oui?117:204);
    doc.text(okLabel, ex, ty); ex += doc.getTextWidth(okLabel)+1.5;
    doc.setFont("helvetica","normal"); doc.setTextColor(190,196,204); doc.text("/", ex, ty); ex += doc.getTextWidth("/")+1.5;
    doc.setFont("helvetica", non?"bold":"normal"); doc.setTextColor(non?130:190, non?140:196, non?150:204);
    doc.text("Non", ex, ty);
    // état (5 pastilles)
    for(let k=0;k<5;k++){
      const cx = cx0 + k*step, sel = s.etat===k;
      if(sel){ const c=ETATC[k]; doc.setFillColor(c[0],c[1],c[2]); doc.circle(cx,cy,2.0,"F"); doc.setTextColor((k===2||k===3)?60:255,(k===2||k===3)?60:255,(k===2||k===3)?60:255); }
      else { doc.setFillColor(240,243,246); doc.circle(cx,cy,2.0,"F"); doc.setTextColor(194,204,214); }
      doc.setFont("helvetica","bold"); doc.setFontSize(6.5);
      doc.text(String(k), cx, cy+0.9, {align:"center"});
    }
    // commentaires
    if(cmtLines.length){
      doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(70,70,70);
      const startY = y + (rowH - cmtLines.length*3.2)/2 + 2.6;
      cmtLines.forEach((ln,li)=> doc.text(ln, cmtX, startY+li*3.2));
    }
    // séparateur
    doc.setDrawColor(228,232,238); doc.setLineWidth(0.2); doc.line(L, y+rowH, R, y+rowH);
    y += rowH;
  }
  function drawSection(title, ids, okLabel){
    ensureSpace(14);
    doc.setFillColor(29,158,117); doc.rect(L,y,W,7,"F");
    doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(255,255,255);
    doc.text(title, L+3, y+4.8); y+=7;
    drawColHeader(okLabel);
    ids.forEach(id=> drawRow(id, okLabel));
    curHeader=null; y+=5;
  }

  // ---- EN-TÊTE ----
  doc.setFont("helvetica","bold"); doc.setFontSize(19); doc.setTextColor(15,42,72);
  doc.text("NARBONNE ACCESSOIRES", L, y); y+=5.5;
  doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.setTextColor(29,158,117);
  doc.text("FICHE DE CONTRÔLE ATELIER - 18 POINTS", L, y);
  doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(130,140,150);
  doc.text("Édité le "+new Date().toLocaleDateString("fr-FR"), R, y, {align:"right"});
  y+=2.5;
  doc.setDrawColor(15,42,72); doc.setLineWidth(0.6); doc.line(L,y,R,y); y+=7;

  // ---- INFOS ----
  doc.setFontSize(9);
  const grid=[
    [["Magasin", i.magasin], ["Date", i.date? new Date(i.date).toLocaleDateString("fr-FR"):""], ["Technicien", i.tech]],
    [["Véhicule", i.vehicule], ["Immat.", (i.immat||"").toUpperCase()], ["Client", i.client]]
  ];
  const gx=[L, L+64, L+124];
  grid.forEach(row=>{
    row.forEach((c,ci)=>{
      doc.setFont("helvetica","bold"); doc.setTextColor(15,42,72);
      doc.text(c[0]+" :", gx[ci], y);
      const lw=doc.getTextWidth(c[0]+" : ");
      doc.setFont("helvetica","normal"); doc.setTextColor(60,60,60);
      doc.text(c[1]||"-", gx[ci]+lw, y);
    });
    y+=6;
  });
  y+=3;

  // ---- SECTIONS ----
  drawSection("ÉQUIPEMENT", EQUIPEMENT.map(slug), "Oui");
  drawSection("ENTRETIEN / RÉVISION / ÉTAT", ENTRETIEN.map(slug), "Conf.");

  // ---- PIED ----
  ensureSpace(14); y+=4;
  doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(110,120,130);
  doc.text("Signature technicien : ______________________", L, y);
  doc.text("Narbonne Accessoires - Document interne", R, y, {align:"right"});

  return doc.output("blob");
}

/* ================= ACTIONS ================= */
function toast(msg,type){ const t=document.getElementById("toast"); t.textContent=msg; t.className="toast show "+(type||""); setTimeout(()=>t.classList.remove("show"),3200); }
function overlay(on){ document.getElementById("overlay").classList.toggle("show",on); }

document.getElementById("btnPdf").addEventListener("click", async ()=>{
  persist(); overlay(true);
  try{ const blob=await makePdfBlob(); const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=pdfFilename(); a.click();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
  }catch(e){ toast("Erreur génération PDF","err"); } finally{ overlay(false); }
});

document.getElementById("btnPrint").addEventListener("click", ()=>{
  persist();
  const w=window.open("","_blank");
  w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>${pdfFilename()}</title></head><body onload="print()">${buildPdfHtml()}</body></html>`);
  w.document.close();
});

document.getElementById("btnSend").addEventListener("click", async ()=>{
  persist();
  const settings = loadSettings();
  const dm = (settings.dmEmail||"").trim();
  if(!state.infos.magasin){ toast("Sélectionner un magasin avant l'envoi","err"); return; }
  if(!dm){ toast("Renseignez l'adresse DM dans Réglages ⚙","err"); openSettings(); return; }
  if(!CONFIG.APPS_SCRIPT_URL){ toast("URL Apps Script non configurée (voir CONFIG)","err"); return; }
  const btn=document.getElementById("btnSend"); btn.disabled=true; overlay(true);
  try{
    const blob=await makePdfBlob();
    const b64 = await blobToBase64(blob);
    const payload={ to:dm, filename:pdfFilename(), pdfBase64:b64, meta:state.infos, items:state.items };
    const res=await fetch(CONFIG.APPS_SCRIPT_URL,{
      method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(payload)
    });
    const out=await res.json();
    if(out && out.ok){ toast("Fiche envoyée à "+dm+" ✓","ok"); }
    else throw new Error(out&&out.error||"Réponse inattendue");
  }catch(e){ toast("Échec de l'envoi : "+e.message,"err"); }
  finally{ btn.disabled=false; overlay(false); }
});

function blobToBase64(blob){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(",")[1]); r.onerror=rej; r.readAsDataURL(blob); }); }

/* ================= RÉGLAGES APPAREIL ================= */
const SET_KEY = "controle_atelier_settings_v1";
function loadSettings(){ try{ return JSON.parse(localStorage.getItem(SET_KEY)) || {}; }catch(e){ return {}; } }
function saveSettings(s){ localStorage.setItem(SET_KEY, JSON.stringify(s)); }
function openSettings(){
  const s = loadSettings();
  document.getElementById("s_dm").value = s.dmEmail || "";
  document.getElementById("s_magasin").value = s.magasinDefault || "";
  document.getElementById("settingsModal").classList.add("show");
}
function closeSettings(){ document.getElementById("settingsModal").classList.remove("show"); }
function initSettingsUI(){
  const sel = document.getElementById("s_magasin");
  CONFIG.STORES.forEach(st=>{ const o=document.createElement("option"); o.value=st; o.textContent=st; sel.appendChild(o); });
  document.getElementById("btnSettings").addEventListener("click", openSettings);
  document.getElementById("s_cancel").addEventListener("click", closeSettings);
  document.getElementById("settingsModal").addEventListener("click", (e)=>{ if(e.target.id==="settingsModal") closeSettings(); });
  document.getElementById("s_save").addEventListener("click", ()=>{
    const dm = document.getElementById("s_dm").value.trim();
    if(dm && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(dm)){ toast("Adresse e-mail invalide","err"); return; }
    const mag = document.getElementById("s_magasin").value;
    saveSettings({ dmEmail:dm, magasinDefault:mag });
    // applique le magasin par défaut si la fiche courante n'en a pas
    const f = document.getElementById("f_magasin");
    if(mag && !f.value){ f.value = mag; persist(); }
    closeSettings();
    toast("Réglages enregistrés ✓","ok");
  });
}

/* ================= NOUVELLE FICHE (RESET) ================= */
function resetForm(){
  Object.values(state.items).forEach(st=>{ st.equipe=null; st.etat=null; st.cmt=""; st.type=null; });
  ["f_tech","f_vehicule","f_immat","f_client"].forEach(id=> document.getElementById(id).value="");
  document.getElementById("f_date").value = new Date().toISOString().slice(0,10);
  const setg = loadSettings();
  document.getElementById("f_magasin").value = setg.magasinDefault || "";
  document.querySelectorAll(".cmt").forEach(c=> c.classList.remove("open"));
  document.querySelectorAll(".item").forEach(card=> card._render());
  persist(); updateProgress();
  window.scrollTo({ top:0, behavior:"smooth" });
  toast("Nouvelle fiche vierge ✓","ok");
}

/* ================= INIT ================= */
function init(){
  buildSelect();
  if(!document.getElementById("f_date").value) document.getElementById("f_date").value=new Date().toISOString().slice(0,10);
  const c=document.getElementById("sections");
  const s1=buildSection("Équipement",EQUIPEMENT,"oui");
  const s2=buildSection("Entretien / Révision / État",ENTRETIEN,"conforme");
  c.appendChild(s1); c.appendChild(s2);
  sectionsEls=[s1,s2];
  restore();
  // magasin par défaut de l'appareil si aucune fiche en cours
  const setg = loadSettings();
  const fmag = document.getElementById("f_magasin");
  if(setg.magasinDefault && !fmag.value){ fmag.value = setg.magasinDefault; }
  initSettingsUI();
  document.getElementById("btnReset").addEventListener("click", ()=>{
    if(confirm("Effacer la fiche en cours et repartir d'un document vierge ?")) resetForm();
  });
  document.querySelectorAll(".item").forEach(card=> card._render());
  ["f_magasin","f_date","f_tech","f_vehicule","f_immat","f_client"].forEach(id=>{
    document.getElementById(id).addEventListener("input", persist);
    document.getElementById(id).addEventListener("change", persist);
  });
  updateProgress();
}
init();

/* ================= PWA : installation + offline ================= */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

(function installFlow(){
  const bar=document.getElementById('installbar');
  const go=document.getElementById('ibGo');
  const x=document.getElementById('ibX');
  const hint=document.getElementById('ibHint');
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone===true;
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  let deferred=null;

  if(isStandalone || localStorage.getItem('install_hidden')==='1') return;

  x.addEventListener('click', ()=>{ bar.classList.remove('show'); localStorage.setItem('install_hidden','1'); });

  // Chrome / Edge / Android : prompt natif
  window.addEventListener('beforeinstallprompt', (e)=>{
    e.preventDefault(); deferred=e;
    hint.textContent="Ajouter l'icône sur le bureau / l'écran d'accueil";
    bar.classList.add('show');
  });
  go.addEventListener('click', async ()=>{
    if(deferred){
      deferred.prompt();
      await deferred.userChoice;
      deferred=null; bar.classList.remove('show');
    } else if(isIOS){
      toast("Appuyez sur Partager ⎋ puis « Sur l'écran d'accueil »", "");
    }
  });
  window.addEventListener('appinstalled', ()=>{ bar.classList.remove('show'); });

  // iOS Safari : pas de prompt natif → afficher la consigne
  if(isIOS){
    hint.textContent="Partager ⎋ → « Sur l'écran d'accueil »";
    go.textContent="Comment ?";
    bar.classList.add('show');
  }
})();
